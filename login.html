<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="index.css">
        <title>Login Page</title>
    </head>

    <body>

        <div class="container">

            <h1>Login</h1>
            <p>Enter your credentials to continue</p>

        <form class="menu" onsubmit="event.preventDefault(); login();">

            <input id="email" type="email" placeholder="Enter Email" class="input-field">
            <input id="password" type="password" placeholder="Enter Password" class="input-field">

            <button type="submit" class="btn">Login</button>

            <a href="register.html" class="btn secondary">Create Account</a>

        </form>

        </div>

        <script src="script.js"></script>

    </body>
</html>
